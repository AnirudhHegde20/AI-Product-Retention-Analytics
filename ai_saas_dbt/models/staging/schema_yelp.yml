version: 2

models:
  - name: stg_yelp_reviews
    description: "Cleaned and standardized Yelp reviews — each row is one user engagement event"

    columns:
      - name: review_id
        description: "Unique review identifier from Yelp (natural key)"
        tests:
          - not_null
          - unique

      - name: user_id
        description: "User who wrote the review — JOIN key to stg_yelp_users"
        tests:
          - not_null

      - name: business_id
        description: "Business being reviewed"
        tests:
          - not_null

      - name: stars
        description: "Star rating 1.0 to 5.0"
        tests:
          - not_null

      - name: review_date
        description: "Date review was written — used for time-based analysis"
        tests:
          - not_null

      - name: review_month
        description: "Truncated to month — used for cohort grouping"
        tests:
          - not_null

      - name: sentiment
        description: "Derived sentiment from star rating"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Positive', 'Neutral', 'Negative']

  - name: stg_yelp_users
    description: "Cleaned Yelp users — each row is one unique user with their cohort month"

    columns:
      - name: user_id
        description: "Unique user identifier from Yelp (natural key)"
        tests:
          - not_null
          - unique

      - name: cohort_month
        description: "Month user first joined — the foundation of all retention analysis"
        tests:
          - not_null

      - name: user_segment
        description: "Derived user segment based on review count"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Power User', 'Regular User', 'Casual User', 'New User']

      - name: influence_tier
        description: "Derived influence tier based on fan count"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Influencer', 'Active', 'Standard']